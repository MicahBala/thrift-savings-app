<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thrift Sync - Join the Cooperative</title>

              "on-secondary-container": "#3d4c83",
              "on-primary-fixed": "#001551",
              "on-tertiary-fixed": "#390c00",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#0039b5",
              "outline": "#747686",
              "tertiary-fixed-dim": "#ffb59c",
              "surface-variant": "#e1e3e4",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #0037B0 0%, #1D4ED8 100%);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopNavBar (Shared Component) -->
<!-- Rule: Suppress navigation if focused journey. However, since user requested TopNavBar explicitly, it is included. -->
<nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-bold tracking-tight text-blue-900 dark:text-blue-100 font-headline">
                Thrift Sync
            </div>
<div class="hidden md:flex space-x-8 items-center">
<a class="text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-colors font-body" href="#">Features</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-300 transition-colors font-body" href="#">About</a>
<button class="bg-primary-container text-white px-5 py-2 rounded-full font-label text-xs tracking-wider uppercase hover:opacity-90 transition-opacity">
                    Support
                </button>
</div>
</div>
</nav>
<main class="min-h-screen pt-24 pb-12 flex items-center justify-center px-4">
<div class="w-full max-w-lg">
<!-- Branding Moment -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-bold text-primary tracking-tight mb-2">Create Account</h1>
<p class="text-on-surface-variant font-body">Join the architectural standard for personal finance.</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-xl p-2 shadow-[0px_12px_32px_rgba(25,28,29,0.04)] overflow-hidden">
<!-- Tabs -->
<div class="flex p-1 bg-surface-container-low rounded-full mb-8">
<button class="flex-1 py-3 text-center font-label text-xs tracking-widest text-on-surface-variant hover:text-on-surface transition-colors">
                        SIGN IN
                    </button>
<!-- Active State: Sign Up -->
<button class="flex-1 py-3 text-center font-label text-xs tracking-widest bg-white text-primary rounded-full shadow-sm font-bold">
                        SIGN UP
                    </button>
</div>
<div class="px-6 pb-8">
<form action="#" class="space-y-6" method="POST">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">FULL NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">person</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">PHONE NUMBER</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">phone</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">PASSWORD</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-12 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div><!-- Bank Name -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">BANK NAME</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">account_balance</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="Enter your bank name" type="text"/>
</div>
</div><!-- Account Number -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant ml-1">ACCOUNT NUMBER</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant text-lg">pin</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 focus:ring-1 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-body-md" placeholder="0000000000" type="number"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 rounded border-outline-variant text-primary-container focus:ring-primary-container" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                                I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                            </label>
</div>
<!-- Submit Button -->
<button class="signature-gradient w-full py-4 rounded-full text-white font-headline font-bold text-lg hover:opacity-90 transition-all shadow-lg shadow-primary-container/20" type="submit">
                            Create Account
                        </button>
</form>
<!-- Social Auth Divider -->
<div class="relative my-8 text-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-high"></div>
</div>
<span class="relative bg-surface-container-lowest px-4 text-xs font-label text-outline-variant">OR CONTINUE WITH</span>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-low border border-outline-variant/15 hover:bg-surface-container-high transition-colors font-body text-sm font-medium">
<img alt="" class="w-5 h-5" data-alt="Google brand icon for login" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3IYjqVLsCzolJJEqms3gX7Cg-q2Lk-z87lEleugSB3XSAG9uT9i0yxzdmUrsaLAsJ-piLS_xplpKkfumdGzanVwBH6h5APkHgb2Hzp1bWiqnLDVju-jfM1728MLZdnR92z2TjTMFqAMEdS99W2JwOSuELkxUhMkH0qIBXeuZmE5PZfR86SlrpUjNyE7Zgw0CsRw05j-anDHEZTGTEPyzqUqNDlPUGrHl-bxoO3wUvNq5xcs8XR7N77FrEQh5X5GKaevA5Lwqq7WQ"/>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-low border border-outline-variant/15 hover:bg-surface-container-high transition-colors font-body text-sm font-medium">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">ios</span>
                            Apple
                        </button>
</div>
</div>
</div>
<!-- Footer Message -->
<p class="mt-8 text-center text-sm text-on-surface-variant font-body">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Sign In here</a>
</p>
</div>
</main>
<!-- Footer (Shared Component) -->
<footer class="w-full py-8 bg-slate-50 dark:bg-slate-950 mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto">
<div class="text-lg font-bold text-slate-900 dark:text-slate-100 font-headline mb-4 md:mb-0">
                Thrift Sync
            </div>
<div class="flex flex-wrap justify-center gap-6 mb-4 md:mb-0">
<a class="text-slate-500 hover:text-slate-800 dark:text-slate-400 font-label text-[0.75rem] font-bold uppercase tracking-widest" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:text-slate-800 dark:text-slate-400 font-label text-[0.75rem] font-bold uppercase tracking-widest" href="#">Terms of Service</a>
<a class="text-slate-500 hover:text-slate-800 dark:text-slate-400 font-label text-[0.75rem] font-bold uppercase tracking-widest" href="#">Security</a>
</div>
<div class="text-slate-500 dark:text-slate-400 text-[0.7rem] font-body">
                © 2024 Thrift Sync. All rights reserved.
            </div>
</div>
</footer>
</body></html>
